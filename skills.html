
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skills</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        /* LOGO */
        .logo{

            font-size: 32px;

            font-weight: 700;

            letter-spacing: 2px;

            color: #ff2a2a;

            text-transform: uppercase;
        }

        /* SECTION SPACING */
        .skills-section{

            margin-bottom: 20px;
        }

        /* SOFT SKILLS POSITION */
        .soft-section{

            margin-top: -120px;
        }

        /* SKILL CARD */
        .skill-card{

            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 25px;

            padding: 40px;

            text-align: center;

            backdrop-filter: blur(10px);
        }

        /* ICON */
        .skill-card i{

            font-size: 55px;

            color: #ff2a2a;

            margin-bottom: 20px;
        }

        /* TEXT */
        .skill-card h2{

            font-size: 24px;

            color: white;
        }

        /* MOBILE */
        @media screen and (max-width:900px){

            .soft-section{

                margin-top: -70px;
            }

            .logo{

                font-size: 22px;

                margin-bottom: 10px;
            }

            .skill-card{

                padding: 30px 20px;
            }

            .skill-card i{

                font-size: 45px;
            }

            .skill-card h2{

                font-size: 20px;
            }
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <!-- LOGO -->
        <div class="logo">

            PHADUNGKEART PORTFOLIO

        </div>

        <!-- MENU -->
        <ul class="nav-links">

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="about.html">
                    About
                </a>
            </li>

            <li>
                <a href="skills.html" class="active">
                    Skills
                </a>
            </li>

            <li>
                <a href="contact.html">
                    Contact
                </a>
            </li>

        </ul>

    </nav>

    <!-- TECHNICAL SKILLS -->
    <section class="page-container fade-up skills-section">

        <h1 class="title">
            TECHNICAL SKILLS
        </h1>

        <div class="skills-grid">

            <!-- HTML -->
            <div class="skill-card">

                <i class="fa-brands fa-html5"></i>

                <h2>
                    HTML
                </h2>

            </div>

            <!-- JAVASCRIPT -->
            <div class="skill-card">

                <i class="fa-brands fa-js"></i>

                <h2>
                    JavaScript
                </h2>

            </div>

            <!-- MYSQL -->
            <div class="skill-card">

                <i class="fa-solid fa-database"></i>

                <h2>
                    MySQL
                </h2>

            </div>

            <!-- C++ -->
            <div class="skill-card">

                <i class="fa-solid fa-code"></i>

                <h2>
                    C++
                </h2>

            </div>

        </div>

    </section>

    <!-- SOFT SKILLS -->
    <section class="page-container fade-up soft-section">

        <h1 class="title">
            SOFT SKILLS
        </h1>

        <div class="skills-grid">

            <!-- ADAPTABILITY -->
            <div class="skill-card">

                <i class="fa-solid fa-arrows-rotate"></i>

                <h2>
                    Adaptability
                </h2>

            </div>

            <!-- TIME MANAGEMENT -->
            <div class="skill-card">

                <i class="fa-solid fa-clock"></i>

                <h2>
                    Time Management
                </h2>

            </div>

            <!-- COMMUNICATION -->
            <div class="skill-card">

                <i class="fa-solid fa-comments"></i>

                <h2>
                    Communication Skills
                </h2>

            </div>

            <!-- TEAMWORK -->
            <div class="skill-card">

                <i class="fa-solid fa-people-group"></i>

                <h2>
                    Teamwork
                </h2>

            </div>

        </div>

    </section>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
