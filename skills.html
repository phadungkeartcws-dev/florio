<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skills</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        /* SECTION SPACING */
        .skills-section{

            margin-bottom: 20px;
        }

        /* SOFT SKILLS POSITION */
        .soft-section{

            margin-top: -120px;
        }

        /* SKILL CARD EFFECT */
        .skill-card{

            position: relative;

            overflow: hidden;

            cursor: pointer;
        }

        /* LIGHT EFFECT */
        .skill-card::before{

            content: "";

            position: absolute;

            width: 200%;

            height: 200%;

            background:
                radial-gradient(
                    rgba(255,0,0,0.18),
                    transparent 70%
                );

            top: -160%;

            left: -160%;

            transition: 0.7s ease;
        }

        /* HOVER */
        .skill-card:hover{

            transform:
                translateY(-10px)
                scale(1.03);

            border-color:
                rgba(255,0,0,0.6);

            box-shadow:
                0 0 25px rgba(255,0,0,0.3),
                0 0 60px rgba(255,0,0,0.15);
        }

        /* MOVE LIGHT */
        .skill-card:hover::before{

            top: -40%;

            left: -40%;
        }

        /* ICON EFFECT */
        .skill-card i{

            transition: 0.4s ease;
        }

        .skill-card:hover i{

            transform:
                scale(1.15)
                rotate(8deg);

            color: #ff4d4d;

            text-shadow:
                0 0 18px rgba(255,0,0,0.7);
        }

        /* TEXT EFFECT */
        .skill-card h2{

            transition: 0.3s ease;
        }

        .skill-card:hover h2{

            color: #ffffff;
        }

        /* MOBILE */
        @media screen and (max-width:900px){

            .soft-section{

                margin-top: -70px;
            }
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <!-- LOGO -->
        <div class="logo">

            PHADUNGKEART PORTFOLIO

        </div>

        <!-- MENU -->
        <ul class="nav-links">

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="about.html">
                    About
                </a>
            </li>

            <li>
                <a href="skills.html" class="active">
                    Skills
                </a>
            </li>

            <li>
                <a href="contact.html">
                    Contact
                </a>
            </li>

        </ul>

    </nav>

    <!-- TECHNICAL SKILLS -->
    <section class="page-container fade-up skills-section">

        <h1 class="title">
            TECHNICAL SKILLS
        </h1>

        <div class="skills-grid">

            <!-- HTML -->
            <div class="skill-card">

                <i class="fa-brands fa-html5"></i>

                <h2>
                    HTML
                </h2>

            </div>

            <!-- JAVASCRIPT -->
            <div class="skill-card">

                <i class="fa-brands fa-js"></i>

                <h2>
                    JavaScript
                </h2>

            </div>

            <!-- MYSQL -->
            <div class="skill-card">

                <i class="fa-solid fa-database"></i>

                <h2>
                    MySQL
                </h2>

            </div>

            <!-- C++ -->
            <div class="skill-card">

                <i class="fa-solid fa-code"></i>

                <h2>
                    C++
                </h2>

            </div>

        </div>

    </section>

    <!-- SOFT SKILLS -->
    <section class="page-container fade-up soft-section">

        <h1 class="title">
            SOFT SKILLS
        </h1>

        <div class="skills-grid">

            <!-- ADAPTABILITY -->
            <div class="skill-card">

                <i class="fa-solid fa-arrows-rotate"></i>

                <h2>
                    Adaptability
                </h2>

            </div>

            <!-- TIME MANAGEMENT -->
            <div class="skill-card">

                <i class="fa-solid fa-clock"></i>

                <h2>
                    Time Management
                </h2>

            </div>

            <!-- COMMUNICATION -->
            <div class="skill-card">

                <i class="fa-solid fa-comments"></i>

                <h2>
                    Communication Skills
                </h2>

            </div>

            <!-- TEAMWORK -->
            <div class="skill-card">

                <i class="fa-solid fa-people-group"></i>

                <h2>
                    Teamwork
                </h2>

            </div>

        </div>

    </section>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
