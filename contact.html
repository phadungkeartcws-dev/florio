<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        /* LOGO */
        .portfolio-logo{

            font-size: 32px;

            font-weight: 700;

            color: #ff2a2a;

            letter-spacing: 2px;

            text-transform: uppercase;
        }

        /* CONTACT CARD LINK */
        .contact-card-link{

            text-decoration: none;

            color: white;

            display: block;
        }

        /* CARD */
        .contact-card{

            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 25px;

            padding: 40px;

            text-align: center;

            backdrop-filter: blur(10px);
        }

        /* ICON */
        .contact-card i{

            font-size: 55px;

            color: #ff2a2a;

            margin-bottom: 20px;
        }

        /* TITLE */
        .contact-card h2{

            margin-bottom: 12px;

            color: white;
        }

        /* TEXT */
        .contact-card p{

            color: #d8d8d8;

            font-size: 17px;

            word-break: break-word;
        }

        /* MOBILE */
        @media screen and (max-width:900px){

            .contact-card{

                padding: 30px 20px;
            }

            .contact-card i{

                font-size: 45px;
            }

            .portfolio-logo{

                font-size: 22px;

                margin-bottom: 10px;
            }
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <!-- LOGO -->
        <div class="portfolio-logo">

            PHADUNGKEART PORTFOLIO

        </div>

        <!-- MENU -->
        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="skills.html">Skills</a></li>

            <li><a href="contact.html" class="active">Contact</a></li>

        </ul>

    </nav>

    <!-- CONTACT -->
    <section class="page-container fade-up">

        <h1 class="title">
            CONTACT
        </h1>

        <div class="contact-grid">

            <!-- PHONE -->
            <a href="tel:+66645658812"
            class="contact-card-link">

                <div class="contact-card">

                    <i class="fa-solid fa-phone"></i>

                    <h2>Phone</h2>

                    <p>
                        064-565-8812
                    </p>

                </div>

            </a>

            <!-- EMAIL -->
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=phadungkeart.cws@gmail.com"
            target="_blank"
            class="contact-card-link">

                <div class="contact-card">

                    <i class="fa-solid fa-envelope"></i>

                    <h2>Email</h2>

                    <p>
                        phadungkeart.cws@gmail.com
                    </p>

                </div>

            </a>

            <!-- PDF PORTFOLIO -->
            <a href="Phadungkeart Chaiwongsa.pdf"
            target="_blank"
            class="contact-card-link">

                <div class="contact-card">

                    <i class="fa-solid fa-file-pdf"></i>

                    <h2>Portfolio</h2>

                    <p>
                        Open My Portfolio PDF
                    </p>

                </div>

            </a>

        </div>

    </section>

    <!-- FOOTER -->
    <footer>

        <p>
            © 2026 PHADUNGKEART PORTFOLIO
        </p>

    </footer>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
